<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全職設計視角｜全站樣板庫</title>
  <meta name="description" content="全職設計視角，提供 90 套完整網站樣板，每套含 12 頁 HTML、SEO 結構、AI Prompt，設計師可直接下載修改交付客戶。">
  <meta property="og:title" content="全職設計視角｜全站樣板庫">
  <meta property="og:description" content="90 套完整網站樣板，每套含 12 頁 HTML、SEO 結構、AI Prompt。">
  <meta property="og:type" content="website">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="assets/css/gallery.css" rel="stylesheet">
</head>
<body>
  <header class="gallery-header">
    <div class="container-fluid">
      <div class="d-flex align-items-center justify-content-between py-2 py-md-3">
        <a href="index.html" class="logo">
          <span class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span>
          <span class="logo-text">全職設計視角</span>
        </a>
        <div class="header-actions d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary d-none d-md-inline-block" id="btnGrid" title="Grid View"><i class="bi bi-grid-3x3"></i></button>
          <button class="btn btn-sm btn-outline-secondary d-none d-md-inline-block" id="btnList" title="List View"><i class="bi bi-list-ul"></i></button>
          <button class="btn btn-sm btn-outline-light" id="btnFilter" title="篩選"><i class="bi bi-funnel"></i> <span class="d-none d-sm-inline">篩選</span></button>
        </div>
      </div>
    </div>
  </header>

  <main class="gallery-main">
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar Filters (desktop) -->
        <aside class="col-lg-3 col-xl-2 sidebar d-none d-lg-block">
          <div class="sidebar-inner">
            <div class="filter-section">
              <h6 class="filter-title">產業分類</h6>
              <div id="industryFilters" class="filter-group"></div>
            </div>
            <div class="filter-section">
              <h6 class="filter-title">色系</h6>
              <div id="colorFilters" class="filter-group"></div>
            </div>
            <div class="filter-section">
              <h6 class="filter-title">版型</h6>
              <div id="layoutFilters" class="filter-group"></div>
            </div>
            <div class="filter-section">
              <h6 class="filter-title">功能標籤</h6>
              <div id="featureFilters" class="filter-group"></div>
            </div>
            <button class="btn btn-sm btn-outline-danger w-100 mt-3" id="btnClearFilters">清除所有篩選</button>
          </div>
        </aside>

        <!-- Mobile Filter Drawer -->
        <div class="filter-drawer-overlay d-lg-none" id="filterOverlay"></div>
        <div class="filter-drawer d-lg-none" id="filterDrawer">
          <div class="filter-drawer-header d-flex justify-content-between align-items-center p-3 border-bottom" style="border-color:var(--g-border)!important">
            <h6 class="mb-0 fw-bold"><i class="bi bi-funnel me-2"></i>篩選條件</h6>
            <button class="btn btn-sm btn-outline-secondary" id="btnCloseFilter"><i class="bi bi-x-lg"></i></button>
          </div>
          <div class="filter-drawer-body p-3">
            <div class="filter-section">
              <h6 class="filter-title">產業分類</h6>
              <div id="industryFiltersM" class="filter-group"></div>
            </div>
            <div class="filter-section">
              <h6 class="filter-title">色系</h6>
              <div id="colorFiltersM" class="filter-group"></div>
            </div>
            <div class="filter-section">
              <h6 class="filter-title">版型</h6>
              <div id="layoutFiltersM" class="filter-group"></div>
            </div>
            <div class="filter-section">
              <h6 class="filter-title">功能標籤</h6>
              <div id="featureFiltersM" class="filter-group"></div>
            </div>
            <button class="btn btn-sm btn-outline-danger w-100 mt-3" id="btnClearFiltersM">清除所有篩選</button>
            <button class="btn btn-primary w-100 mt-2" id="btnApplyFilter">套用篩選</button>
          </div>
        </div>

        <!-- Template Grid -->
        <section class="col-12 col-lg-9 col-xl-10 template-area">
          <div class="template-toolbar d-flex justify-content-between align-items-center mb-3">
            <div class="result-count"><span id="resultCount">0</span> 套樣板</div>
            <div class="active-filters" id="activeFilters"></div>
          </div>
          <div id="templateGrid" class="row g-4"></div>
          <div id="noResults" class="no-results d-none">
            <i class="bi bi-search"></i>
            <p>沒有符合條件的樣板</p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="gallery-footer text-center py-4">
    <p class="mb-1 text-muted">&copy; 2026 全職設計視角. All rights reserved.</p>
    <p class="mb-0" style="color:#6c7ee1;font-size:.8rem;">Powered by Mimo 2.5 Pro</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/gallery.js"></script>
</body>
</html>
