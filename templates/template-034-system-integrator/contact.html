<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand" href="index.html"><i class="bi bi-diagram-3-fill"></i>宏碁系統整合</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse justify-content-center" id="mainNav">

<li class="nav-item"><a class="nav-link active" href="contact.html">聯絡我們</a></li>
</ul>
</div>
</div>

<section class="about-hero">
<div class="container text-center">
<span class="section-tag">Contact</span>
<h1 class="section-title mt-3">聯絡我們</h1>
<p style="color:var(--text-muted)">歡迎與我們聯繫，獲得專業諮詢</p>
</div>
</section>

<section class="section-padding">
<div class="container">
<div class="row g-5">
<div class="col-lg-5">
<h3 class="mb-4">歡迎與我們聯繫</h3>
<div class="d-flex mb-4">
<i class="bi bi-geo-alt-fill" style="font-size:1.5rem;color:var(--primary)"></i>
<div class="ms-3">
<h6>辦公室</h6>
<p style="color:var(--text-muted)">台北市信義區松仁路 100 號 15F</p>
</div>
</div>
<div class="d-flex mb-4">
<i class="bi bi-telephone-fill" style="font-size:1.5rem;color:var(--primary)"></i>
<div class="ms-3">
<h6>電話</h6>
<p style="color:var(--text-muted)">(02) 2345-6789</p>
</div>
</div>
<div class="d-flex mb-4">
<i class="bi bi-envelope-fill" style="font-size:1.5rem;color:var(--primary)"></i>
<div class="ms-3">
<h6>Email</h6>
<p style="color:var(--text-muted)">info@sysintegrate.tw</p>
</div>
</div>
<div class="d-flex mb-4">
<i class="bi bi-clock-fill" style="font-size:1.5rem;color:var(--primary)"></i>
<div class="ms-3">
<h6>營業時間</h6>
<p style="color:var(--text-muted)">週一至週五 09:00-18:00</p>
</div>
</div>
</div>
<div class="col-lg-7">
<form class="contact-form">
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">姓名</label>
<input type="text" class="form-control" required>
</div>
<div class="col-md-6">
<label class="form-label">公司</label>
<input type="text" class="form-control">
</div>
<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>
<div class="col-md-6">
<label class="form-label">電話</label>
<input type="tel" class="form-control">
</div>
<div class="col-12">
<label class="form-label">需求類型</label>
<select class="form-select">
<option>ERP 導入</option>
<option>CRM 系統</option>
<option>雲端遷移</option>
<option>資安防護</option>
<option>其他</option>
</select>
</div>
<div class="col-12">
<label class="form-label">訊息</label>
<textarea class="form-control" rows="4" required></textarea>
</div>
<div class="col-12">
<button type="submit" class="btn btn-primary btn-lg">送出</button>
</div>
</div>
</form>
<div class="thank-you-msg">
<i class="bi bi-check-circle-fill d-block"></i>
<h3>感謝您的詢問！</h3>
<p style="color:var(--text-muted)">我們將在 24 小時內回覆。</p>
</div>
</div>
</div>
</div>
</section>
