  <section class="section"><div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow p-4 fade-in">
          <h3 class="mb-4">選擇方案</h3>
          <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="card border-primary h-100"><div class="card-body text-center"><h5>基礎方案</h5><h3 class="text-primary">NT$499<small>/月</small></h3><a href="#" class="btn btn-outline-primary btn-sm mt-2">選擇</a></div></div></div>

            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">姓名 *</label><input type="text" class="form-control" required></div>

              <div class="col-md-6"><label class="form-label">電話 *</label><input type="tel" class="form-control" required></div>

              <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" id="agree" required><label class="form-check-label" for="agree">我同意<a href="#">使用條款</a>和<a href="#">隱私政策</a></label></div></div>
              <div class="col-12"><button type="submit" class="btn btn-primary-custom btn-lg w-100">完成報名 <i class="bi bi-check-circle ms-2"></i></button></div>
            </div>
          </form>
