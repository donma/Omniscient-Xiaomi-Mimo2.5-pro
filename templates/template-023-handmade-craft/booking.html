  <section class="section-padding"><div class="container">
    <div class="row justify-content-center"><div class="col-lg-8">
      <div class="booking-form">
        <h3 style="font-family:var(--font-heading);text-align:center;margin-bottom:0.5rem;">報名表單</h3>
        <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;">請填寫以下資訊，我們會盡快與您聯繫確認。</p>
        <form>
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">姓名 *</label><input type="text" class="form-control" placeholder="請輸入姓名" required></div>
            <div class="col-md-6"><label class="form-label">電話 *</label><input type="tel" class="form-control" placeholder="請輸入電話" required></div>
            <div class="col-md-6"><label class="form-label">電子郵件</label><input type="email" class="form-control" placeholder="請輸入電子郵件"></div>
            <div class="col-md-6"><label class="form-label">課程選擇 *</label><select class="form-select" required><option value="">請選擇</option><option>皮革手作 - NT$ 1,800</option><option>木工體驗 - NT$ 2,200</option><option>陶藝拉坯 - NT$ 1,500</option><option>植物染布 - NT$ 1,600</option><option>金工飾品 - NT$ 2,500</option></select></div>
            <div class="col-md-6"><label class="form-label">參加日期 *</label><input type="date" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">人數</label><input type="number" class="form-control" placeholder="請輸入人數" min="1"></div>
            <div class="col-12"><label class="form-label">備註</label><textarea class="form-control" rows="4" placeholder="請填寫其他需求"></textarea></div>
            <div class="col-12 text-center"><button type="submit" class="btn btn-craft" style="padding:0.7rem 3rem;">送出報名</button></div>
          </div>
        </form>
      </div>
    </div></div>
