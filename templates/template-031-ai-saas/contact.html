<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-cpu-fill brand-icon"></i> NeuralFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse justify-content-center" id="mainNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">關於</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">產品功能</a></li>
                    <li class="nav-item"><a class="nav-link" href="portfolio.html">客戶案例</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">常見問題</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">技術部落格</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">聯絡我們</a></li>
                </ul>
            </div>
            <a href="booking.html" class="btn btn-neon d-none d-lg-block">免費試用</a>
        </div>
    </nav>

    <section class="about-hero">
        <div class="container text-center">
            <span class="section-tag">Contact</span>
            <h1 class="section-title">聯絡我們</h1>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="row g-5">
                <div class="col-lg-5">
                    <h3 class="mb-4">讓我們幫助您</h3>
                    <div class="d-flex mb-4">
                        <div class="me-3"><i class="bi bi-geo-alt-fill" style="font-size:1.5rem;color:var(--neon)"></i></div>
                        <div><h6>辦公室地址</h6><p style="color:var(--text-muted)">台北市信義區松仁路 100 號 15F</p></div>
                    </div>
                    <div class="d-flex mb-4">
                        <div class="me-3"><i class="bi bi-telephone-fill" style="font-size:1.5rem;color:var(--neon)"></i></div>
                        <div><h6>電話</h6><p style="color:var(--text-muted)">(02) 2345-6789</p></div>
                    </div>
                    <div class="d-flex mb-4">
                        <div class="me-3"><i class="bi bi-envelope-fill" style="font-size:1.5rem;color:var(--neon)"></i></div>
                        <div><h6>電子信箱</h6><p style="color:var(--text-muted)">hello@neuralflow.ai</p></div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <form class="contact-form">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">姓名</label><input type="text" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label">公司</label><input type="text" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label">電話</label><input type="tel" class="form-control"></div>
                            <div class="col-12"><label class="form-label">訊息</label><textarea class="form-control" rows="4" required></textarea></div>
                            <div class="col-12"><button type="submit" class="btn btn-neon btn-lg">送出訊息</button></div>
                        </div>
                    </form>
                    <div class="thank-you-msg">
                        <i class="bi bi-check-circle-fill d-block"></i>
                        <h3>感謝您的詢問！</h3>
                        <p style="color:var(--text-muted)">我們將在 24 小時內回覆您。</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2024 NeuralFlow AI.</p></div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
