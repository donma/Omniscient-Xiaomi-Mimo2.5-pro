<body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-cpu-fill brand-icon"></i> NeuralFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse justify-content-center" id="mainNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">關於</a></li>

                </ul>
            </div>
            <a href="booking.html" class="btn btn-neon d-none d-lg-block">免費試用</a>
        </div>
    </nav>

    <section class="about-hero">
        <div class="container text-center">
            <span class="section-tag">Start Free</span>
            <h1 class="section-title">開始 14 天免費試用</h1>
            <p style="color:var(--text-muted)">無需信用卡，立即體驗完整功能</p>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <form class="contact-form">
                        <div class="mb-3">
                            <label class="form-label">公司名稱</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">您的姓名</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">電子信箱</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">電話號碼</label>
                            <input type="tel" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">公司規模</label>
                            <select class="form-select">
                                <option>請選擇</option>
                                <option>1-50 人</option>
                                <option>51-200 人</option>
                                <option>201-1000 人</option>
                                <option>1000+ 人</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">感興趣的模組</label>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="c1"><label class="form-check-label" for="c1">NLP 引擎</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="c2"><label class="form-check-label" for="c2">預測分析</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="c3"><label class="form-check-label" for="c3">自動化工作流</label></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">其他需求</label>
                            <textarea class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-neon w-100 btn-lg">開始免費試用</button>
                    </form>
                    <div class="thank-you-msg">
                        <i class="bi bi-check-circle-fill d-block"></i>
                        <h3>感謝您的詢問！</h3>
                        <p style="color:var(--text-muted)">我們已收到您的申請，將在 24 小時內寄出試用帳號。</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2024 NeuralFlow AI.</p></div>
